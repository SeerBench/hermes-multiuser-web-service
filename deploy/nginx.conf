worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Upstreams — gateway + platform-api run on the host in dev.
    upstream agent_gateway {
        server host.docker.internal:8643;
    }

    upstream platform_api {
        server host.docker.internal:8700;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 25m;

        # Platform control plane
        location /api/v1/ {
            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent gateway (SSE chat + legacy key auth)
        location /api/ {
            proxy_pass http://agent_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location /static/ {
            alias /usr/share/nginx/html/;
            try_files $uri =404;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
