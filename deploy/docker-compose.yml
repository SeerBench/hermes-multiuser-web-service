# Hermes multi-user SaaS stack (MVP).
# Usage: cp deploy/.env.example deploy/.env && docker compose -f deploy/docker-compose.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Platform API — run on host in dev; uncomment for all-in-docker deploy.
  # platform-api:
  #   build: ..
  #   command: hermes-platform-api
  #   environment:
  #     PLATFORM_DATABASE_URL: postgresql+psycopg://hermes:hermes@postgres:5432/hermes_platform
  #     NEW_API_BASE_URL: ${NEW_API_BASE_URL}
  #     NEW_API_ADMIN_TOKEN: ${NEW_API_ADMIN_TOKEN}
  #   ports:
  #     - "8700:8700"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../gateway/web/_static:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:
