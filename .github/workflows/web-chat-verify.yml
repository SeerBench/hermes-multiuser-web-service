name: Web Chat SPA

on:
  push:
    branches: [main]
    paths:
      - 'web-chat/**'
      - '.github/workflows/web-chat-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web-chat/**'
      - '.github/workflows/web-chat-verify.yml'

permissions:
  contents: read

concurrency:
  group: web-chat-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web-chat
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945f8dad677a1d88e1d9db86b94  # v6.1.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-chat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: typecheck + unit tests + production build
        run: npm run verify
