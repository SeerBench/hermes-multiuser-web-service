name: web-http-fetch
version: 1.0.0
description: "Zero-key web extract — fetches a URL with httpx and converts the response HTML to text using stdlib html.parser. Bundled with the hermes-multiuser-web-service fork so web_extract has a usable default in deployments without a paid Firecrawl/Tavily/Exa/Parallel key."
author: SeerBench / hermes-multiuser-web-service
kind: backend
provides_web_providers:
  - http-fetch
